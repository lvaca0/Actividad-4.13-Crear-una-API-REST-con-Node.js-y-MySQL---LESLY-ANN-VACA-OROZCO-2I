<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda API - Frontend</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        
        /* Formulario */
        .form-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* Botones */
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.3s; }
        .btn-submit { background-color: #2ecc71; color: white; width: 100%; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-update { background-color: #3498db; color: white; display: none; width: 100%; }
        .btn-edit { background-color: #f1c40f; color: white; margin-right: 5px; }
        .btn-delete { background-color: #e74c3c; color: white; }
        
        /* Tabla */
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Gestión de Agenda (CRUD)</h1>

    <div class="form-card">
        <h3 id="form-title">Agregar Nuevo Registro</h3>
        <input type="hidden" id="userId">
        <div class="form-grid">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="nombre" placeholder="Ej. Ana Gómez">
            </div>
            <div class="form-group">
                <label>Dirección:</label>
                <input type="text" id="direccion" placeholder="Ej. Av. Sol #12">
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" id="telefono" placeholder="Ej. 1234567890">
            </div>
            <div class="form-group">
                <label>Fecha de Nacimiento:</label>
                <input type="date" id="fecha_nacimiento">
            </div>
        </div>
        <button id="btnGuardar" class="btn btn-submit" onclick="guardarUsuario()">Guardar Registro</button>
        <button id="btnActualizar" class="btn btn-update" onclick="actualizarUsuario()">Actualizar Registro</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Fecha Nac.</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaUsuarios">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/usuarios';

    // 1. OBTENER TODOS LOS REGISTROS (Read)
    async function cargarUsuarios() {
        try {
            const response = await fetch(`${API_URL}?action=getAll`);
            const usuarios = await response.json();
            const tbody = document.getElementById('tablaUsuarios');
            tbody.innerHTML = '';

            usuarios.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.nombre}</td>
                        <td>${u.direccion}</td>
                        <td>${u.telefono}</td>
                        <td>${u.fecha_nacimiento}</td>
                        <td>
                            <button class="btn btn-edit" onclick="prepararEdicion(${u.id}, '${u.nombre}', '${u.direccion}', '${u.telefono}', '${u.fecha_nacimiento}')">Editar</button>
                            <button class="btn btn-delete" onclick="eliminarUsuario(${u.id})">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error('Error al cargar usuarios:', error);
        }
    }

    // 2. AGREGAR REGISTRO (Create)
    async function guardarUsuario() {
        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;
        const telefono = document.getElementById('telefono').value;
        const fecha_nacimiento = document.getElementById('fecha_nacimiento').value;

        if(!nombre || !direccion || !telefono || !fecha_nacimiento) return alert('Por favor, llena todos los campos');

        try {
            const url = `${API_URL}?action=add&nombre=${encodeURIComponent(nombre)}&direccion=${encodeURIComponent(direccion)}&telefono=${encodeURIComponent(telefono)}&fecha_nacimiento=${fecha_nacimiento}`;
            await fetch(url);
            limpiarFormulario();
            cargarUsuarios();
        } catch (error) {
            alert('Error al guardar');
        }
    }

    // 3. PREPARAR EL FORMULARIO PARA EDITAR
    function prepararEdicion(id, nombre, direccion, telefono, fecha) {
        document.getElementById('userId').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('direccion').value = direccion;
        document.getElementById('telefono').value = telefono;
        document.getElementById('fecha_nacimiento').value = fecha;

        document.getElementById('form-title').innerText = 'Editar Registro #' + id;
        document.getElementById('btnGuardar').style.display = 'none';
        document.getElementById('btnActualizar').style.display = 'block';
    }

    // 4. ACTUALIZAR REGISTRO (Update)
    async function actualizarUsuario() {
        const id = document.getElementById('userId').value;
        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;
        const telefono = document.getElementById('telefono').value;
        const fecha_nacimiento = document.getElementById('fecha_nacimiento').value;

        try {
            const url = `${API_URL}?action=update&id=${id}&nombre=${encodeURIComponent(nombre)}&direccion=${encodeURIComponent(direccion)}&telefono=${encodeURIComponent(telefono)}&fecha_nacimiento=${fecha_nacimiento}`;
            await fetch(url);
            
            limpiarFormulario();
            cargarUsuarios();
        } catch (error) {
            alert('Error al actualizar');
        }
    }

    // 5. ELIMINAR REGISTRO (Delete)
    async function eliminarUsuario(id) {
        if(confirm('¿Seguro que deseas eliminar este registro?')) {
            try {
                await fetch(`${API_URL}?action=delete&id=${id}`);
                cargarUsuarios();
            } catch (error) {
                alert('Error al eliminar');
            }
        }
    }

    function limpiarFormulario() {
        document.getElementById('userId').value = '';
        document.getElementById('nombre').value = '';
        document.getElementById('direccion').value = '';
        document.getElementById('telefono').value = '';
        document.getElementById('fecha_nacimiento').value = '';
        
        document.getElementById('form-title').innerText = 'Agregar Nuevo Registro';
        document.getElementById('btnGuardar').style.display = 'block';
        document.getElementById('btnActualizar').style.display = 'none';
    }

    // Cargar la lista automáticamente al abrir la página
    window.onload = cargarUsuarios;
</script>

</body>
</html>
